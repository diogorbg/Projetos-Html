<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player Organizado</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 20px; font-family: Arial, sans-serif; 
            background-color: #0f0f0f; color: white; 
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh;
        }
        .main-layout { display: flex; flex-direction: column; width: 100%; max-width: 1200px; gap: 24px; margin-top: 20px; }
        .player-area { flex: 1; background: #161616; padding: 20px; border-radius: 12px; min-width: 0; }
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 8px; overflow: hidden; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .track-info { margin: 20px 0 10px 0; min-width: 0; }
        
        .track-title { 
            font-size: 1.6rem; 
            font-weight: bold; 
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
        .track-album { font-size: 1.1rem; color: #28a745; margin-bottom: 5px; font-weight: 500; }
        
        /* Controles customizados com botões parcialmente transparentes */
        .custom-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 15px; }
        .btn {
            background: rgba(40, 167, 69, 0.15);
            border: none;
            color: #2ea44f;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
        }
        .btn:hover {
            background: rgba(40, 167, 69, 0.85);
            border-color: #28a745;
            color: white;
        }

        /* Área da Playlist com scrollbar customizada para Firefox e Webkit */
        .playlist-area { 
            width: 100%; 
            background: #161616; 
            border-radius: 12px; 
            padding: 15px; 
            max-height: 600px; 
            overflow-y: auto; 
            border: 1px solid #2f2f2f;
        }
        
        /* Scrollbar Customizada para Chrome, Edge e Safari */
        .playlist-area::-webkit-scrollbar { width: 4px; }
        .playlist-area::-webkit-scrollbar-track {
            background: transparent; 
        }
        .playlist-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px;
            transition: background 0.2s;
        }
        .playlist-area:hover::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25); 
        }

        .playlist-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #2f2f2f; }
        .playlist-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 8px; }
        .playlist-item:hover { background: #272727; }
        .playlist-item.active { background: #383838; border-left: 4px solid #28a745; }
        .thumb-preview { width: 80px; height: 45px; background-color: #000; border-radius: 4px; object-fit: cover; }
        .item-info { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-title { font-size: 0.95rem; font-weight: bold; }

        /* --- Estrutura e Animação do Descanso de Tela --- */
        #screensaver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            display: none;
            overflow: hidden;
        }

        /* Fundo Borrado (Usado no modo CD) */
        .screensaver-bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(4px) brightness(0.5);
            z-index: 1;
            transition: opacity 0.5s ease;
        }

        /* Imagem Padrão Ken Burns */
        #screensaver-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            animation: kenBurnsEffect 30s ease-in-out infinite alternate;
            transition: opacity 0.5s ease;
        }

        /* --- Estrutura do CD Giratório --- */
        .cd-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 120vh; /* 120% da altura da tela */
            width: 120vh;  /* Mantém proporção 1:1 perfeita para o círculo */
            z-index: 2;
            display: none; /* Ativado via JS */
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Permite clicar no fundo para fechar */
        }

        .cd-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0,0,0,0.6);
            position: relative;
            animation: girarCD 120s linear infinite;
        }

        /* Furo central do CD e efeito de ranhuras reflexivas plásticas */
        .cd-disc::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18%;
            height: 18%;
            background: #0f0f0f;
            border-radius: 50%;
            box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.05), inset 0 0 20px rgba(0,0,0,0.9);
            z-index: 3;
        }

        /* Brilho reflexivo simulando o plástico do CD */
        .cd-disc::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 40%, rgba(255,255,255,0.03) 50%, transparent 60%),
                        linear-gradient(135deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%),
                        linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
            z-index: 2;
            pointer-events: none;
        }

        /* Controle de alternar modo interno do Screensaver */
        .screensaver-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10001;
            transition: background 0.2s;
            font-size: 0.9rem;
        }
        .screensaver-toggle-btn:hover {
            background: #28a745;
        }

        /* Barra de Progresso do Descanso de Tela */
        .screensaver-progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 10000;
        }

        .screensaver-progress-bar {
            width: 0%;
            height: 100%;
            background: #28a745;
            transition: width 0.1s linear;
        }

        @keyframes kenBurnsEffect {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        @keyframes girarCD {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (min-width: 900px) {
            .main-layout { flex-direction: row; }
            .playlist-area { width: 380px; max-height: 600px; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="player-area">
            <div class="video-wrapper">
                <video id="meu-player" controls controlsList="nodownload"></video>
            </div>
            <div class="track-info">
                <div id="album-tag" class="track-album" style="display: none;">Coleção</div>
                <div id="titulo" class="track-title">Nome da Música</div>
            </div>
            <div class="custom-controls">
                <button class="btn" onclick="musicaAnterior()">⏮ Voltar</button>
                <button class="btn" onclick="proximaMusica()">Avançar ⏭</button>
                <button class="btn" onclick="iniciarDescansoTela()">⛶</button>
            </div>
        </div>

        <div class="playlist-area">
            <div class="playlist-header">Fila de Reprodução</div>
            <div id="lista-renderizada"></div>
        </div>
    </div>

    <div id="screensaver">
        <button class="screensaver-toggle-btn" onclick="alternarModoScreensaver(event)">⟳</button>
        
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:1;" onclick="fecharDescansoTela()">
            <img id="screensaver-img" src="" alt="Descanso de Tela">
            <img id="screensaver-bg-blur" class="screensaver-bg-blur" src="" alt="Fundo Borrado" style="display: none;">
        </div>

        <div id="cd-container" class="cd-container">
            <div id="cd-disc" class="cd-disc"></div>
        </div>

        <div class="screensaver-progress-container">
            <div id="screensaver-bar" class="screensaver-progress-bar"></div>
        </div>
    </div>

    <script>
        // Os dados estruturados serão injetados aqui
        const itensMídia = "__DADOS_PLAYLIST__";

        let indiceItemAtual = 0;   
        let indiceSubMusica = 0;   

        const player = document.getElementById('meu-player');
        const txtTitulo = document.getElementById('titulo');
        const txtAlbum = document.getElementById('album-tag');
        const containerLista = document.getElementById('lista-renderizada');

        // Referências do Descanso de Tela
        const screensaver = document.getElementById('screensaver');
        const screensaverImg = document.getElementById('screensaver-img');

        function renderizarInterfaceLista() {
            containerLista.innerHTML = '';
            itensMídia.forEach((item, index) => {
                const elementoDiv = document.createElement('div');
                elementoDiv.className = `playlist-item ${index === indiceItemAtual ? 'active' : ''}`;
                elementoDiv.onclick = () => clicarNoItemDaLista(index);

                let capaSrc = '';
                let tituloItem = '';
                let subTextoHTML = '';

                if (item.tipo === 'musica') {
                    capaSrc = item.dados.capaUrl ? separarEFormatarCaminho(item.dados.capaUrl) : '';
                    tituloItem = item.dados.titulo;
                    subTextoHTML = ''; 
                } else {
                    capaSrc = item.capaColecaoUrl ? separarEFormatarCaminho(item.capaColecaoUrl) : '';
                    tituloItem = item.nomeColecao;
                    subTextoHTML = `<div style="font-size: 0.8rem; color: #b3b3b3;">Coleção • ${item.musicas.length} mídias</div>`;
                }

                if (!capaSrc) {
                    capaSrc = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="45" viewBox="0 0 80 45"><rect width="100%" height="100%" fill="%23222"/></svg>';
                }

                elementoDiv.innerHTML = `
                    <img class="thumb-preview" src="${capaSrc}" alt="Capa">
                    <div class="item-info">
                        <div class="item-title">${tituloItem}</div>
                        ${subTextoHTML}
                    </div>
                `;
                containerLista.appendChild(elementoDiv);
            });
        }

        function separarEFormatarCaminho(caminho) {
            return caminho.split('/').map(encodeURIComponent).join('/');
        }

        function carregarElemento(indexItem, indexMusicaInterna = 0) {
            if (indexItem < 0 || indexItem >= itensMídia.length) return;
            
            indiceItemAtual = indexItem;
            indiceSubMusica = indexMusicaInterna;

            const item = itensMídia[indiceItemAtual];

            if (item.tipo === 'musica') {
                player.src = separarEFormatarCaminho(item.dados.audioUrl);
                player.poster = item.dados.capaUrl ? separarEFormatarCaminho(item.dados.capaUrl) : '';
                txtTitulo.innerText = item.dados.titulo;
                txtAlbum.style.display = 'none';
            } else {
                const musica = item.musicas[indiceSubMusica];
                player.src = separarEFormatarCaminho(musica.audioUrl);
                
                const imagemFinal = musica.capaUrl ? musica.capaUrl : item.capaColecaoUrl;
                player.poster = imagemFinal ? separarEFormatarCaminho(imagemFinal) : '';
                
                const totalMusicas = item.musicas.length;
                txtTitulo.innerText = `${indiceSubMusica + 1}/${totalMusicas} • ${musica.titulo}`;
                txtAlbum.innerText = `Coleção: ${item.nomeColecao}`;
                txtAlbum.style.display = 'block';
            }

            renderizarInterfaceLista();
            atualizarImagemDescansoTela();

            if ('mediaSession' in navigator) {
                let mTitulo = txtTitulo.innerText;
                let mAlbum = item.tipo === 'musica' ? 'Música Local' : item.nomeColecao;
                let mCapa = player.poster;

                navigator.mediaSession.metadata = new MediaMetadata({
                    title: mTitulo,
                    artist: 'Streaming Local',
                    album: mAlbum,
                    artwork: mCapa ? [{ src: mCapa, sizes: '512x512', type: 'image/jpeg' }] : []
                });

                navigator.mediaSession.setActionHandler('previoustrack', () => { musicaAnterior(); });
                navigator.mediaSession.setActionHandler('nexttrack', () => { proximaMusica(); });
            }
        }

        function clicarNoItemDaLista(index) {
            carregarElemento(index, 0);
            player.play();
        }

        function proximaMusica() {
            const item = itensMídia[indiceItemAtual];

            if (item.tipo === 'musica') {
                indiceItemAtual = (indiceItemAtual + 1) >= itensMídia.length ? 0 : indiceItemAtual + 1;
                carregarElemento(indiceItemAtual, 0);
            } else {
                indiceSubMusica++;
                if (indiceSubMusica >= item.musicas.length) {
                    indiceItemAtual = (indiceItemAtual + 1) >= itensMídia.length ? 0 : indiceItemAtual + 1;
                    carregarElemento(indiceItemAtual, 0);
                } else {
                    carregarElemento(indiceItemAtual, indiceSubMusica);
                }
            }
            player.play();
        }

        function musicaAnterior() {
            const item = itensMídia[indiceItemAtual];

            if (item.tipo === 'musica') {
                indiceItemAtual--;
                if (indiceItemAtual < 0) indiceItemAtual = itensMídia.length - 1;
                
                const itemAnterior = itensMídia[indiceItemAtual];
                const subIndice = itemAnterior.tipo === 'colecao' ? itemAnterior.musicas.length - 1 : 0;
                carregarElemento(indiceItemAtual, subIndice);
            } else {
                indiceSubMusica--;
                if (indiceSubMusica < 0) {
                    indiceItemAtual--;
                    if (indiceItemAtual < 0) indiceItemAtual = itensMídia.length - 1;
                    
                    const itemAnterior = itensMídia[indiceItemAtual];
                    const subIndice = itemAnterior.tipo === 'colecao' ? itemAnterior.musicas.length - 1 : 0;
                    carregarElemento(indiceItemAtual, subIndice);
                } else {
                    carregarElemento(indiceItemAtual, indiceSubMusica);
                }
            }
            player.play();
        }

        /* --- Lógica do Descanso de Tela --- */
        const screensaverBar = document.getElementById('screensaver-bar');
        const screensaverBgBlur = document.getElementById('screensaver-bg-blur');
        const cdContainer = document.getElementById('cd-container');
        const cdDisc = document.getElementById('cd-disc');
        
        // Modos: 'kenburns' ou 'cd'
        let modoScreensaverAtual = 'kenburns'; 

        function atualizarImagemDescansoTela() {
            const imagemCapa = player.poster;
            const svgFallback = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450"><rect width="100%" height="100%" fill="%23222"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%23444" font-family="Arial" font-size="24">Sem Capa</text></svg>';
            
            const srcFinal = imagemCapa ? imagemCapa : svgFallback;

            // Atualiza as imagens de fundo
            screensaverImg.src = srcFinal;
            screensaverBgBlur.src = srcFinal;

            // Atualiza a textura do CD
            if (imagemCapa) {
                cdDisc.style.backgroundImage = `url('${imagemCapa}')`;
            } else {
                cdDisc.style.backgroundImage = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500"><rect width="100%" height="100%" fill="%23333"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%23555" font-family="Arial" font-size="30">CD Player</text></svg>')`;
            }

            aplicarVisibilidadeModo();
        }

        function aplicarVisibilidadeModo() {
            if (modoScreensaverAtual === 'cd') {
                screensaverImg.style.display = 'none';
                screensaverBgBlur.style.display = 'block';
                cdContainer.style.display = 'flex';
            } else {
                screensaverImg.style.display = 'block';
                screensaverBgBlur.style.display = 'none';
                cdContainer.style.display = 'none';
            }
        }

        function alternarModoScreensaver(event) {
            // Evita que o clique feche o screensaver
            event.stopPropagation(); 
            modoScreensaverAtual = modoScreensaverAtual === 'kenburns' ? 'cd' : 'kenburns';
            aplicarVisibilidadeModo();
        }

        function iniciarDescansoTela() {
            atualizarImagemDescansoTela();
            screensaver.style.display = 'block';
        }

        function fecharDescansoTela() {
            screensaver.style.display = 'none';
        }

        // Atualiza a barra visual do descanso de tela conforme a mídia toca
        player.addEventListener('timeupdate', () => {
            if (player.duration) {
                const porcentagem = (player.currentTime / player.duration) * 100;
                screensaverBar.style.width = porcentagem + '%';
            } else {
                screensaverBar.style.width = '0%';
            }
        });

        player.addEventListener('ended', proximaMusica);
        window.onload = () => { 
            carregarElemento(0, 0); 
        };
    </script>
</body>
</html>
