<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Playlist Portátil</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .generator-container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #b3b3b3;
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            background: #007bff;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-upload:hover {
            background: #0056b3;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="generator-container">
        <h1>Organizador de Mídias</h1>
        <p>Selecione a pasta contendo os seus arquivos .mp3 e .jpg para gerar o player portátil autônomo.</p>

        <div class="file-input-wrapper">
            <button class="btn-upload">📁 Selecionar Pasta de Músicas</button>
            <input type="file" id="seletor-pasta" webkitdirectory directory multiple>
        </div>
    </div>

    <script>
        document.getElementById('seletor-pasta').addEventListener('change', async (event) => {
            const arquivos = Array.from(event.target.files);

            // Filtra apenas arquivos MP3
            const mp3s = arquivos.filter(arq => arq.name.toLowerCase().endsWith('.mp3'));

            if (mp3s.length === 0) {
                alert('Nenhum arquivo .mp3 encontrado na pasta selecionada.');
                return;
            }

            // Monta a estrutura de dados baseada nos nomes locais dos arquivos
            const listaMusicas = mp3s.map(mp3 => {
                const nomeSemExtensao = mp3.name.substring(0, mp3.name.lastIndexOf('.'));
                const temCapa = arquivos.some(arq => arq.name.toLowerCase() === `${nomeSemExtensao.toLowerCase()}.jpg`);

                return {
                    titulo: nomeSemExtensao,
                    audioUrl: mp3.name,
                    capaUrl: temCapa ? `${nomeSemExtensao}.jpg` : ''
                };
            });

            // Gerando o template do _playlist.html
            const htmlGerado = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player Organizado</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .player-container { text-align: center; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); width: 100%; max-width: 800px; }
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 10px; overflow: hidden; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .track-info { margin: 20px 0 10px 0; }
        .track-title { font-size: 1.6rem; font-weight: bold; margin-bottom: 5px; }
        .custom-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 15px; }
        .btn { background: #28a745; border: none; color: white; padding: 12px 24px; font-size: 1rem; border-radius: 50px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #218838; }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="video-wrapper">
            <video id="meu-player" controls controlsList="nodownload"></video>
        </div>
        <div class="track-info">
            <div id="titulo" class="track-title">Nome da Música</div>
        </div>
        <div class="custom-controls">
            <button class="btn" onclick="musicaAnterior()">⏮ Voltar</button>
            <button class="btn" onclick="proximaMusica()">Avançar ⏭</button>
        </div>
    </div>

    <script>
        const playlist = ${JSON.stringify(listaMusicas, null, 4)};

        let indiceAtual = 0;
        const player = document.getElementById('meu-player');
        const txtTitulo = document.getElementById('titulo');

        function carregarMusica(indice) {
            const musica = playlist[indice];
            player.src = encodeURIComponent(musica.audioUrl);
            player.poster = musica.capaUrl ? encodeURIComponent(musica.capaUrl) : '';
            txtTitulo.innerText = musica.titulo;

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: musica.titulo,
                    artist: 'Local',
                    artwork: musica.capaUrl ? [{ src: encodeURIComponent(musica.capaUrl), sizes: '512x512', type: 'image/jpeg' }] : []
                });

                navigator.mediaSession.setActionHandler('previoustrack', () => { musicaAnterior(); });
                navigator.mediaSession.setActionHandler('nexttrack', () => { proximaMusica(); });
            }
        }

        function proximaMusica() {
            indiceAtual = (indiceAtual + 1) >= playlist.length ? 0 : indiceAtual + 1;
            carregarMusica(indiceAtual);
            player.play();
        }

        function musicaAnterior() {
            indiceAtual = (indiceAtual - 1) < 0 ? playlist.length - 1 : indiceAtual - 1;
            carregarMusica(indiceAtual);
            player.play();
        }

        player.addEventListener('ended', proximaMusica);
        window.onload = () => { carregarMusica(indiceAtual); };
    <\/script>
</body>
</html>`;

            // Processo para forçar o download do arquivo gerado
            const blob = new Blob([htmlGerado], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '_playlist.html';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>

</body>

</html>
