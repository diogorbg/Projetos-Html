<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Playlist Portátil com Lista</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .generator-container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #b3b3b3;
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            background: #007bff;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-upload:hover {
            background: #0056b3;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="generator-container">
        <h1>Organizador de Mídias</h1>
        <p>Selecione a pasta raiz contendo suas músicas e subpastas para gerar o player portátil.</p>

        <div class="file-input-wrapper">
            <button class="btn-upload">📁 Selecionar Pasta de Músicas</button>
            <input type="file" id="seletor-pasta" webkitdirectory directory multiple>
        </div>
    </div>

    <script>
        document.getElementById('seletor-pasta').addEventListener('change', async (event) => {
            const arquivos = Array.from(event.target.files);
            const mp3s = arquivos.filter(arq => arq.webkitRelativePath.toLowerCase().endsWith('.mp3'));

            if (mp3s.length === 0) {
                alert('Nenhum arquivo .mp3 encontrado.');
                return;
            }

            const listaMistaVisivel = [];
            const colecoesAgrupadas = {};

            mp3s.forEach(mp3 => {
                const partes = mp3.webkitRelativePath.split('/');
                const estaNaRaiz = partes.length === 2;

                const caminhoRelativoComSubpasta = partes.slice(1).join('/');
                const nomeSemExtensao = mp3.name.substring(0, mp3.name.lastIndexOf('.'));
                const subpastaNome = !estaNaRaiz ? partes[partes.length - 2] : null;

                const temImagemPropria = arquivos.some(arq => {
                    const partesImg = arq.webkitRelativePath.split('/');
                    const nomeImgSemExtensao = arq.name.substring(0, arq.name.lastIndexOf('.'));

                    return arq.name.toLowerCase().endsWith('.jpg') &&
                        nomeSemExtensao.toLowerCase() === nomeImgSemExtensao.toLowerCase() &&
                        partes.slice(0, -1).join('/') === partesImg.slice(0, -1).join('/');
                });

                const dadosMusica = {
                    titulo: nomeSemExtensao,
                    audioUrl: caminhoRelativoComSubpasta,
                    capaUrl: temImagemPropria ? caminhoRelativoComSubpasta.substring(0, caminhoRelativoComSubpasta.lastIndexOf('.')) + '.jpg' : ''
                };

                if (estaNaRaiz) {
                    listaMistaVisivel.push({ tipo: 'musica', dados: dadosMusica });
                } else {
                    if (!colecoesAgrupadas[subpastaNome]) {
                        colecoesAgrupadas[subpastaNome] = {
                            tipo: 'colecao',
                            nomeColecao: subpastaNome,
                            capaColecaoUrl: '',
                            musicas: []
                        };
                    }
                    colecoesAgrupadas[subpastaNome].musicas.push(dadosMusica);
                }
            });

            for (const subpastaNome in colecoesAgrupadas) {
                const colecao = colecoesAgrupadas[subpastaNome];
                const musicaComCapa = colecao.musicas.find(m => m.capaUrl !== '');
                if (musicaComCapa) {
                    colecao.capaColecaoUrl = musicaComCapa.capaUrl;
                } else {
                    const qualquerImagemNaPasta = arquivos.find(arq => {
                        const partesImg = arq.webkitRelativePath.split('/');
                        const pastaImg = partesImg.length > 2 ? partesImg[partesImg.length - 2] : "";
                        return pastaImg === subpastaNome && arq.name.toLowerCase().endsWith('.jpg');
                    });
                    if (qualquerImagemNaPasta) {
                        colecao.capaColecaoUrl = qualquerImagemNaPasta.webkitRelativePath.split('/').slice(1).join('/');
                    }
                }
                listaMistaVisivel.push(colecao);
            }

            try {
                // Executa requisições paralelas para buscar o template e as partes modulares isoladas do descanso de tela
                const [resTemplate, resCSS, resJS] = await Promise.all([
                    fetch('player_template.html'),
                    fetch('screensaver.css'),
                    fetch('screensaver.js')
                ]);

                if (!resTemplate.ok) throw new Error('Não foi possível carregar o player_template.html');
                if (!resCSS.ok) throw new Error('Não foi possível carregar o screensaver.css');
                if (!resJS.ok) throw new Error('Não foi possível carregar o screensaver.js');

                const templateHtml = await resTemplate.text();
                const cssScreensaver = await resCSS.text();
                const jsScreensaver = await resJS.text();

                // Formatação estruturada do JSON de mídias
                const jsonString = JSON.stringify(listaMistaVisivel, null, 4);

                // Executa a montagem em cadeia substituindo as tags coringas pelos conteúdos puros
                let htmlPronto = templateHtml.replace('"__DADOS_PLAYLIST__"', jsonString);
                htmlPronto = htmlPronto.replace('/*__CSS_SCREENSAVER__*/', cssScreensaver);
                htmlPronto = htmlPronto.replace('/*__JS_SCREENSAVER__*/', jsScreensaver);

                // Executa o download automático do arquivo empacotado compilado
                const blob = new Blob([htmlPronto], { type: 'text/html' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = '_playlist.html';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

            } catch (erro) {
                alert('Erro ao carregar os módulos do template: ' + erro.message);
                console.error(erro);
            }
        });
    </script>

</body>

</html>
