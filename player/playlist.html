<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Playlist Portátil com Lista</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .generator-container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #b3b3b3;
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            background: #007bff;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-upload:hover {
            background: #0056b3;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="generator-container">
        <h1>Organizador de Mídias</h1>
        <p>Selecione a pasta contendo os seus arquivos .mp3 e .jpg para gerar o player portátil autônomo.</p>
        <p>Será gerado o `_playlist.html` com layout estilo YouTube (Player + Lista Lateral). Subpastas viram coleções.</p>

        <div class="file-input-wrapper">
            <button class="btn-upload">📁 Selecionar Pasta de Músicas</button>
            <input type="file" id="seletor-pasta" webkitdirectory directory multiple>
        </div>
    </div>

    <script>
        document.getElementById('seletor-pasta').addEventListener('change', async (event) => {
            const arquivos = Array.from(event.target.files);

            // Filtra apenas arquivos MP3
            const mp3s = arquivos.filter(arq => arq.webkitRelativePath.toLowerCase().endsWith('.mp3'));

            if (mp3s.length === 0) {
                alert('Nenhum arquivo .mp3 encontrado.');
                return;
            }

            // Lista final que conterá tanto itens do tipo "musica" quanto do tipo "colecao"
            const listaMistaVisivel = [];
            // Dicionário temporário para agrupar as subpastas
            const colecoesAgrupadas = {};

            mp3s.forEach(mp3 => {
                const partes = mp3.webkitRelativePath.split('/');
                const estaNaRaiz = partes.length === 2; // Ex: "PastaRaiz/musica.mp3"

                const caminhoRelativoComSubpasta = partes.slice(1).join('/');
                const nomeSemExtensao = mp3.name.substring(0, mp3.name.lastIndexOf('.'));
                const subpastaNome = !estaNaRaiz ? partes[partes.length - 2] : null;

                // Busca se essa música específica possui uma imagem JPG de mesmo nome na mesma pasta dela
                const temImagemPropria = arquivos.some(arq => {
                    const partesImg = arq.webkitRelativePath.split('/');
                    const caminhoRelativoImg = partesImg.slice(1).join('/');
                    const nomeImgSemExtensao = arq.name.substring(0, arq.name.lastIndexOf('.'));

                    return arq.name.toLowerCase().endsWith('.jpg') &&
                        nomeSemExtensao.toLowerCase() === nomeImgSemExtensao.toLowerCase() &&
                        partes.slice(0, -1).join('/') === partesImg.slice(0, -1).join('/');
                });

                const dadosMusica = {
                    titulo: nomeSemExtensao,
                    audioUrl: caminhoRelativoComSubpasta,
                    capaUrl: temImagemPropria ? caminhoRelativoComSubpasta.substring(0, caminhoRelativoComSubpasta.lastIndexOf('.')) + '.jpg' : ''
                };

                if (estaNaRaiz) {
                    // É uma música solta da raiz. Vai direto para a lista principal como um item individual
                    listaMistaVisivel.push({
                        tipo: 'musica',
                        dados: dadosMusica
                    });
                } else {
                    // Está dentro de uma subpasta. Agrupa na coleção correspondente
                    if (!colecoesAgrupadas[subpastaNome]) {
                        colecoesAgrupadas[subpastaNome] = {
                            tipo: 'colecao',
                            nomeColecao: subpastaNome,
                            capaColecaoUrl: '',
                            musicas: []
                        };
                    }
                    colecoesAgrupadas[subpastaNome].musicas.push(dadosMusica);
                }
            });

            // Processa as capas das coleções baseado na primeira imagem válida encontrada dentro delas
            for (const subpastaNome in colecoesAgrupadas) {
                const colecao = colecoesAgrupadas[subpastaNome];

                // Tenta achar a primeira música da coleção que tenha uma capa própria
                const musicaComCapa = colecao.musicas.find(m => m.capaUrl !== '');
                if (musicaComCapa) {
                    colecao.capaColecaoUrl = musicaComCapa.capaUrl;
                } else {
                    // Se nenhuma música tiver capa individual, procura por qualquer arquivo .jpg solto na pasta
                    const qualquerImagemNaPasta = arquivos.find(arq => {
                        const partesImg = arq.webkitRelativePath.split('/');
                        const pastaImg = partesImg.length > 2 ? partesImg[partesImg.length - 2] : "";
                        return pastaImg === subpastaNome && arq.name.toLowerCase().endsWith('.jpg');
                    });
                    if (qualquerImagemNaPasta) {
                        colecao.capaColecaoUrl = qualquerImagemNaPasta.webkitRelativePath.split('/').slice(1).join('/');
                    }
                }

                // Insere a coleção estruturada na lista mista principal
                listaMistaVisivel.push(colecao);
            }

            // Gerando o template do _playlist.html
            const htmlGerado = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player Organizado</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 20px; font-family: Arial, sans-serif; 
            background-color: #0f0f0f; color: white; 
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh;
        }
        .main-layout { display: flex; flex-direction: column; width: 100%; max-width: 1200px; gap: 24px; margin-top: 20px; }
        .player-area { flex: 1; background: #161616; padding: 20px; border-radius: 12px; min-width: 0; }
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 8px; overflow: hidden; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .track-info { margin: 20px 0 10px 0; min-width: 0; }
        
        .track-title { 
            font-size: 1.6rem; 
            font-weight: bold; 
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
        .track-album { font-size: 1.1rem; color: #28a745; margin-bottom: 5px; font-weight: 500; }
        .custom-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 15px; }
        .btn { background: #28a745; border: none; color: white; padding: 12px 24px; font-size: 1rem; border-radius: 50px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #218838; }

        .playlist-area { width: 100%; background: #161616; border-radius: 12px; padding: 15px; max-height: 600px; overflow-y: auto; border: 1px solid #2f2f2f; }
        .playlist-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #2f2f2f; }
        .playlist-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 8px; }
        .playlist-item:hover { background: #272727; }
        .playlist-item.active { background: #383838; border-left: 4px solid #28a745; }
        .thumb-preview { width: 80px; height: 45px; background-color: #000; border-radius: 4px; object-fit: cover; }
        .item-info { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-title { font-size: 0.95rem; font-weight: bold; }
        .item-count { font-size: 0.8rem; color: #b3b3b3; }

        @media (min-width: 900px) {
            .main-layout { flex-direction: row; }
            .playlist-area { width: 380px; max-height: 600px; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="player-area">
            <div class="video-wrapper">
                <video id="meu-player" controls controlsList="nodownload"></video>
            </div>
            <div class="track-info">
                <div id="album-tag" class="track-album" style="display: none;">Coleção</div>
                <div id="titulo" class="track-title">Nome da Música</div>
            </div>
            <div class="custom-controls">
                <button class="btn" onclick="musicaAnterior()">⏮ Voltar</button>
                <button class="btn" onclick="proximaMusica()">Avançar ⏭</button>
            </div>
        </div>

        <div class="playlist-area">
            <div class="playlist-header">Fila de Reprodução</div>
            <div id="lista-renderizada"></div>
        </div>
    </div>

    <script>
        // Injeção da estrutura de dados híbrida
        const itensMídia = //__DADOS_PLAYLIST__ ;

        let indiceItemAtual = 0;   // Índice do item principal na lista da barra lateral
        let indiceSubMusica = 0;   // Se for uma coleção, controla qual música interna está tocando

        const player = document.getElementById('meu-player');
        const txtTitulo = document.getElementById('titulo');
        const txtAlbum = document.getElementById('album-tag');
        const containerLista = document.getElementById('lista-renderizada');

        function renderizarInterfaceLista() {
            containerLista.innerHTML = '';
            itensMídia.forEach((item, index) => {
                const elementoDiv = document.createElement('div');
                elementoDiv.className = \`playlist-item \${index === indiceItemAtual ? 'active' : ''}\`;
                elementoDiv.onclick = () => clicarNoItemDaLista(index);

                let capaSrc = '';
                let tituloItem = '';
                let subTextoHTML = ''; // Alterado para renderizar condicionalmente

                if (item.tipo === 'musica') {
                    capaSrc = item.dados.capaUrl ? separarEFormatarCaminho(item.dados.capaUrl) : '';
                    tituloItem = item.dados.titulo;
                    subTextoHTML = ''; // AJUSTE: String vazia para não ocupar espaço nem renderizar texto em avulsas
                } else {
                    capaSrc = item.capaColecaoUrl ? separarEFormatarCaminho(item.capaColecaoUrl) : '';
                    tituloItem = item.nomeColecao;
                    subTextoHTML = \`<div class="item-count">Coleção • \${item.musicas.length} mídias</div>\`;
                }

                if (!capaSrc) {
                    capaSrc = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="45" viewBox="0 0 80 45"><rect width="100%" height="100%" fill="%23222"/></svg>';
                }

                elementoDiv.innerHTML = \`
                    <img class="thumb-preview" src="\${capaSrc}" alt="Capa">
                    <div class="item-info">
                        <div class="item-title">\${tituloItem}</div>
                        \${subTextoHTML}
                    </div>
                \`;
                containerLista.appendChild(elementoDiv);
            });
        }

        function separarEFormatarCaminho(caminho) {
            return caminho.split('/').map(encodeURIComponent).join('/');
        }

        function carregarElemento(indexItem, indexMusicaInterna = 0) {
            if (indexItem < 0 || indexItem >= itensMídia.length) return;
            
            indiceItemAtual = indexItem;
            indiceSubMusica = indexMusicaInterna;

            const item = itensMídia[indiceItemAtual];

            if (item.tipo === 'musica') {
                player.src = separarEFormatarCaminho(item.dados.audioUrl);
                player.poster = item.dados.capaUrl ? separarEFormatarCaminho(item.dados.capaUrl) : '';
                txtTitulo.innerText = item.dados.titulo;
                txtAlbum.style.display = 'none';
            } else {
                const musica = item.musicas[indiceSubMusica];
                player.src = separarEFormatarCaminho(musica.audioUrl);
                
                const imagemFinal = musica.capaUrl ? musica.capaUrl : item.capaColecaoUrl;
                player.poster = imagemFinal ? separarEFormatarCaminho(imagemFinal) : '';
                
                const totalMusicas = item.musicas.length;
                txtTitulo.innerText = \`\${indiceSubMusica + 1}/\${totalMusicas} • \${musica.titulo}\`;
                
                txtAlbum.innerText = \`Coleção: \${item.nomeColecao}\`;
                txtAlbum.style.display = 'block';
            }

            renderizarInterfaceLista();

            if ('mediaSession' in navigator) {
                let mTitulo = txtTitulo.innerText;
                let mAlbum = item.tipo === 'musica' ? 'Música Local' : item.nomeColecao;
                let mCapa = player.poster;

                navigator.mediaSession.metadata = new MediaMetadata({
                    title: mTitulo,
                    artist: 'Streaming Local',
                    album: mAlbum,
                    artwork: mCapa ? [{ src: mCapa, sizes: '512x512', type: 'image/jpeg' }] : []
                });

                navigator.mediaSession.setActionHandler('previoustrack', () => { musicaAnterior(); });
                navigator.mediaSession.setActionHandler('nexttrack', () => { proximaMusica(); });
            }
        }

        function clicarNoItemDaLista(index) {
            carregarElemento(index, 0);
            player.play();
        }

        function proximaMusica() {
            const item = itensMídia[indiceItemAtual];

            if (item.tipo === 'musica') {
                indiceItemAtual = (indiceItemAtual + 1) >= itensMídia.length ? 0 : indiceItemAtual + 1;
                carregarElemento(indiceItemAtual, 0);
            } else {
                indiceSubMusica++;
                if (indiceSubMusica >= item.musicas.length) {
                    indiceItemAtual = (indiceItemAtual + 1) >= itensMídia.length ? 0 : indiceItemAtual + 1;
                    carregarElemento(indiceItemAtual, 0);
                } else {
                    carregarElemento(indiceItemAtual, indiceSubMusica);
                }
            }
            player.play();
        }

        function musicaAnterior() {
            const item = itensMídia[indiceItemAtual];

            if (item.tipo === 'musica') {
                indiceItemAtual--;
                if (indiceItemAtual < 0) indiceItemAtual = itensMídia.length - 1;
                
                const itemAnterior = itensMídia[indiceItemAtual];
                const subIndice = itemAnterior.tipo === 'colecao' ? itemAnterior.musicas.length - 1 : 0;
                carregarElemento(indiceItemAtual, subIndice);
            } else {
                indiceSubMusica--;
                if (indiceSubMusica < 0) {
                    indiceItemAtual--;
                    if (indiceItemAtual < 0) indiceItemAtual = itensMídia.length - 1;
                    
                    const itemAnterior = itensMídia[indiceItemAtual];
                    const subIndice = itemAnterior.tipo === 'colecao' ? itemAnterior.musicas.length - 1 : 0;
                    carregarElemento(indiceItemAtual, subIndice);
                } else {
                    carregarElemento(indiceItemAtual, indiceSubMusica);
                }
            }
            player.play();
        }

        player.addEventListener('ended', proximaMusica);
        window.onload = () => { carregarElemento(0, 0); };
    <\/script>
</body>
</html>`;

            const jsonString = JSON.stringify(listaMistaVisivel, null, 4);
            const htmlPronto = htmlGerado.replace('//__DADOS_PLAYLIST__', jsonString);

            const blob = new Blob([htmlPronto], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '_playlist.html';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>

</body>

</html>
