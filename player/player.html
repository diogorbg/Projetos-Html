<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .player-container {
            text-align: center;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            /* Limita a largura máxima para manter a proporção correta em telas grandes */
            max-width: 800px;
        }

        /* Container que força a proporção 16:9 perfeita (720p proporcional) */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            /* Isso garante a proporção 16:9 (9 / 16 * 100) */
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Garante que a imagem preencha os 16:9 sem distorcer */
        }

        .track-info {
            margin: 20px 0 10px 0;
        }

        .track-title {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .track-artist {
            font-size: 1.1rem;
            color: #b3b3b3;
        }

        .custom-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
        }

        .btn {
            background: #28a745;
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #218838;
        }
    </style>
</head>

<body>

    <div class="player-container">
        <div class="video-wrapper">
            <video id="meu-player" controls controlsList="nodownload"></video>
        </div>

        <div class="track-info">
            <div id="titulo" class="track-title">Nome da Música</div>
            <!-- <div id="artista" class="track-artist">Artista</div> -->
        </div>

        <div class="custom-controls">
            <button class="btn" onclick="musicaAnterior()">⏮ Voltar</button>
            <button class="btn" onclick="proximaMusica()">Avançar ⏭</button>
        </div>
    </div>
    <script src="file:///C:/Users/diogo/Music/playlist.js"></script>
    <script>
        let indiceAtual = 0;
        const player = document.getElementById('meu-player');
        const txtTitulo = document.getElementById('titulo');
        const txtArtista = document.getElementById('artista');

        function carregarMusica(indice) {
            const musica = playlist[indice];
            player.src = musica.audioUrl;
            player.poster = musica.capaUrl;
            txtTitulo.innerText = musica.titulo;
            // txtArtista.innerText = musica.artista;

            // --- NOVA PARTE: Integração com o Windows ---
            // não funcionou... mas fica a ideia
            /*if ('mediaSession' in navigator) {
                // 1. Atualiza as informações no painel do Windows
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: musica.titulo,
                    artist: musica.artista,
                    album: 'Minha Playlist TV',
                    artwork: [
                        { src: musica.capaUrl, sizes: '512x512', type: 'image/jpeg' }
                    ]
                });

                // 2. Mapeia o botão "Anterior" do Windows/Teclado
                navigator.mediaSession.setActionHandler('previoustrack', () => {
                    anterior();
                });

                // 3. Mapeia o botão "Próximo" do Windows/Teclado
                navigator.mediaSession.setActionHandler('nexttrack', () => {
                    proxima();
                });
            }*/
        }

        function proximaMusica() {
            indiceAtual++;
            if (indiceAtual >= playlist.length) {
                indiceAtual = 0;
            }
            carregarMusica(indiceAtual);
            player.play();
        }

        function musicaAnterior() {
            indiceAtual--;
            if (indiceAtual < 0) {
                indiceAtual = playlist.length - 1;
            }
            carregarMusica(indiceAtual);
            player.play();
        }

        player.addEventListener('ended', proximaMusica);

        window.onload = () => {
            carregarMusica(indiceAtual);
        };
    </script>

</body>

</html>
