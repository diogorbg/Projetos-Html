<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .btn {
            background: #28a745;
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
        }

        .btn-tv {
            background: #007bff;
        }

        .track-info {
            margin: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <h1>Controle do Player</h1>

    <button class="btn btn-tv" onclick="abrirJanelaTransmissao()">720p</button>
    <button class="btn btn-tv" onclick="abrirJanelaTransmissao2()">480p</button>

    <div class="track-info">
        <p><strong>Status:</strong> <span id="status">Janela da TV fechada</span></p>
        <p><strong>Tocando agora:</strong> <span id="musica-atual">-</span></p>
    </div>

    <div>
        <button class="btn" onclick="controlarJanela('anterior')">⏮ Voltar</button>
        <button class="btn" onclick="controlarJanela('play')">▶ Play</button>
        <button class="btn" onclick="controlarJanela('pause')">⏸ Pause</button>
        <button class="btn" onclick="controlarJanela('proxima')">Avançar ⏭</button>
    </div>

    <script>
        let janelaTV = null;

        function abrirJanelaTransmissao() {
            // Configurações para forçar o tamanho exato de 720p (1280x720)
            // 'menubar=no,toolbar=no,location=no' remove as bordas e barras desnecessárias
            const largura = 1280;
            const altura = 720;
            const recursos = `width=${largura},height=${altura},menubar=no,toolbar=no,location=no,status=no,resizable=no`;

            janelaTV = window.open('tv.html', 'JanelaTransmissao', recursos);

            document.getElementById('status').innerText = "Janela da TV Aberta! Pode transmitir esta janela.";
        }

        function abrirJanelaTransmissao2() {
            const largura = 854;
            const altura = 480;
            const recursos = `width=${largura},height=${altura},menubar=no,toolbar=no,location=no,status=no,resizable=no`;

            janelaTV = window.open('tv.html', 'JanelaTransmissao', recursos);

            document.getElementById('status').innerText = "Janela da TV Aberta! Pode transmitir esta janela.";
        }

        // Função para enviar comandos de controle para a outra janela
        function controlarJanela(acao) {
            if (janelaTV && !janelaTV.closed) {
                janelaTV.postMessage({ comando: acao }, '*');
            } else {
                alert("Abra a janela da TV primeiro!");
            }
        }

        // Escuta o que a janela da TV está tocando para atualizar o painel de controle
        window.addEventListener('message', (event) => {
            if (event.data.titulo) {
                document.getElementById('musica-atual').innerText = `${event.data.titulo} - ${event.data.artista}`;
            }
        });
    </script>

</body>

</html>
